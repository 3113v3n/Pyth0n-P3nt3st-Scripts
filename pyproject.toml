[tool.pytest.ini_options]
minversion = "9.0"
testpaths = ["tests"]
python_files = ["test_*.py"]
addopts = "-ra"

[tool.ruff]
target-version = "py313"
line-length = 100
exclude = [
  ".git",
  ".pytest_cache",
  ".ruff_cache",
  ".venv",
  "__pycache__",
  ".tmp",
  "output_directory",
  "tools",
]

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = ["E501"]
